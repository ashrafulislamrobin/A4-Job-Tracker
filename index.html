<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>

    <!-- Tailwind  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
        .fontGeist{
              font-family: "Geist", sans-serif;
        }
    </style>
  </head>
  <body class="fontGeist w-[80%] mx-auto bg-[#f1f2f4]">
    <section>
          <h1 class="font-bold text-4xl my-4" >Job Application Tracker</h1>  
    </section>

    <section class="flex gap-4 justify-between">
        <div class="w-[22rem] bg-[#ffffff] px-5 py-5 rounded-md">
            <p class="text-[14px]">Total</p>
            <p class="text-2xl font-bold ">8</p>
        </div>
        <div class="w-[22rem] bg-[#ffffff] px-5 py-5 rounded-md">
            <p class="text-[14px]">Interview</p>
            <p class="text-2xl font-bold text-green-500">0</p>
        </div>
        <div class="w-[22rem] bg-[#ffffff] px-5 py-5 rounded-md">
            <p class="text-[14px]">Rejected</p>
            <p class="text-2xl font-bold text-red-500 ">0</p>
        </div>

    </section>

<hr class="my-3 opacity-20 ">

    <section class="space-y-2 mt-2">
        <h1>Available Jobs</h1>
        <div class="">
            <button class="bg-[#ffffff] text-gray-500 px-2 py-1  w-[80px] rounded-sm cursor-pointer">All</button>
            <button class="bg-[#ffffff] text-gray-500 px-2 py-1  w-[80px] rounded-sm cursor-pointer">All</button>
            <button class="bg-[#ffffff] text-gray-500 px-2 py-1  w-[80px] rounded-sm cursor-pointer">All</button>
        </div>
    </section>
    <script src="./script.js"></script>
  </body>
</html>
